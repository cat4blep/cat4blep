<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="128" viewBox="0 0 1000 128" role="img" aria-labelledby="title desc">
  <title id="title">Toolbox: languages and Minecraft ecosystem</title>
  <desc id="desc">Programming languages: Java, Python, and JavaScript. Minecraft ecosystem: Fabric, NeoForge, and Paper.</desc>
  <defs>
