<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">cat4blep — Minecraft modder and developer</title>
  <desc id="desc">A dark developer-profile banner with cyan and violet accents and a terminal card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a12"/>
      <stop offset="0.55" stop-color="#0d1324"/>
      <stop offset="1" stop-color="#15112b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.52" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <radialGradient id="glowCyan">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <circle cx="92" cy="60" r="220" fill="url(#glowCyan)"/>
  <circle cx="1124" cy="315" r="310" fill="url(#glowViolet)"/>
  <path d="M0 322 C260 250 420 390 680 305 S1010 240 1200 287 V360 H0Z" fill="#ffffff" opacity="0.018"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(72 58)">
      <rect x="0" y="0" width="230" height="30" rx="15" fill="#101a2c" stroke="#67e8f9" stroke-opacity="0.28"/>
      <circle cx="18" cy="15" r="4" fill="#67e8f9"/>
      <text x="32" y="20" fill="#a5f3fc" font-size="12" font-weight="700" letter-spacing="1.8">DEV PROFILE / ONLINE</text>

      <text x="0" y="116" fill="#f8fafc" font-size="72" font-weight="800" letter-spacing="-4">cat4blep</text>
      <rect x="2" y="132" width="478" height="5" rx="2.5" fill="url(#accent)"/>
      <text x="0" y="178" fill="#cbd5e1" font-size="21">Minecraft modding · Java · playful systems</text>
      <text x="0" y="216" fill="#7dd3fc" font-size="15">making distant worlds feel a little more alive</text>

      <g transform="translate(0 246)" font-size="13" font-weight="700">
        <rect width="76" height="34" rx="10" fill="#151f35" stroke="#fb923c" stroke-opacity="0.45"/>
        <text x="20" y="22" fill="#fed7aa">JAVA</text>
        <rect x="88" width="92" height="34" rx="10" fill="#151f35" stroke="#67e8f9" stroke-opacity="0.42"/>
        <text x="108" y="22" fill="#a5f3fc">FABRIC</text>
        <rect x="192" width="112" height="34" rx="10" fill="#151f35" stroke="#a78bfa" stroke-opacity="0.45"/>
        <text x="210" y="22" fill="#ddd6fe">NEOFORGE</text>
        <rect x="316" width="96" height="34" rx="10" fill="#151f35" stroke="#f0abfc" stroke-opacity="0.42"/>
        <text x="337" y="22" fill="#f5d0fe">PYTHON</text>
      </g>
    </g>

    <g transform="translate(770 45)" filter="url(#shadow)">
      <rect width="366" height="270" rx="24" fill="#080c16" stroke="#94a3b8" stroke-opacity="0.22"/>
      <rect x="1" y="1" width="364" height="43" rx="23" fill="#111827"/>
      <path d="M1 43 H365" stroke="#94a3b8" stroke-opacity="0.16"/>
      <circle cx="24" cy="22" r="5" fill="#fb7185"/>
      <circle cx="43" cy="22" r="5" fill="#fbbf24"/>
      <circle cx="62" cy="22" r="5" fill="#4ade80"/>
      <text x="126" y="27" fill="#64748b" font-size="12">cat4blep@github</text>

      <g transform="translate(28 77)" font-size="15">
        <text x="0" y="0" fill="#67e8f9">$</text>
        <text x="20" y="0" fill="#cbd5e1">whoami</text>
        <text x="20" y="30" fill="#f8fafc">cat4blep</text>

        <text x="0" y="70" fill="#67e8f9">$</text>
        <text x="20" y="70" fill="#cbd5e1">focus --now</text>
        <text x="20" y="100" fill="#c4b5fd">minecraft_modding</text>

        <text x="0" y="140" fill="#67e8f9">$</text>
        <text x="20" y="140" fill="#cbd5e1">status</text>
        <text x="20" y="170" fill="#86efac">building something weird...</text>
        <rect x="281" y="157" width="9" height="19" rx="1" fill="#67e8f9">
          <animate attributeName="opacity" values="1;0;1" dur="1.15s" repeatCount="indefinite"/>
        </rect>
      </g>

      <g transform="translate(304 72)" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.75">
        <path d="M0 14 L3 0 L14 8 L25 0 L29 14"/>
        <path d="M1 15 C1 30 28 30 28 15"/>
        <circle cx="10" cy="16" r="1.5" fill="#67e8f9" stroke="none"/>
        <circle cx="20" cy="16" r="1.5" fill="#67e8f9" stroke="none"/>
        <path d="M13 21 Q15 23 17 21"/>
      </g>
    </g>
  </g>

  <rect x="0.75" y="0.75" width="1198.5" height="358.5" rx="33.25" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
</svg>
